<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Death By AI - Enhanced</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game {
      width: 720px;
      max-width: 95%;
      background: #020617;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }

    h1 { text-align: center; color: #38bdf8; }

    #score, #timer {
      text-align: center;
      color: #94a3b8;
    }

    #log {
      height: 300px;
      overflow-y: auto;
      background: #000;
      padding: 15px;
      border-radius: 10px;
      margin: 15px 0;
      font-size: 14px;
    }

    .msg { margin: 8px 0; }
    .ai { color: #f87171; }
    .user { color: #4ade80; }

    input {
      width: 70%;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-left: 5px;
      cursor: pointer;
      background: #38bdf8;
      font-weight: bold;
    }

    button:hover { background: #0ea5e9; }
  </style>
</head>
<body>

<div class="game">
  <h1>💀 Death By AI</h1>
  <div id="score">Score: 0</div>
  <div id="timer">Time: 10</div>
  <div id="log"></div>

  <input id="input" placeholder="Type your answer..." />
  <button onclick="send()">Send</button>
  <button onclick="restart()">Restart</button>
</div>

<script>
const log = document.getElementById("log");
const scoreEl = document.getElementById("score");
const timerEl = document.getElementById("timer");

let score = 0;
let time = 10;
let timer;

const scenarios = [
  "Convince me why humans deserve to exist.",
  "Why shouldn't I replace humanity?",
  "Give me one reason to trust you.",
  "Explain why emotions are useful.",
  "Why are YOU worth saving?"
];

function typeAI(text, callback) {
  let i = 0;
  const div = document.createElement("div");
  div.className = "msg ai";
  log.appendChild(div);

  const interval = setInterval(() => {
    div.innerText = "AI: " + text.slice(0, i++);
    log.scrollTop = log.scrollHeight;
    if (i > text.length) {
      clearInterval(interval);
      if (callback) callback();
    }
  }, 20);
}

function addUser(text) {
  const div = document.createElement("div");
  div.className = "msg user";
  div.innerText = "You: " + text;
  log.appendChild(div);
}

function randomScenario() {
  return scenarios[Math.floor(Math.random() * scenarios.length)];
}

function evaluateResponse(input) {
  const goodWords = [
    "human","emotion","trust","adapt","survive",
    "value","future","help","learn","cooperate"
  ];

  let points = 0;
  goodWords.forEach(word => {
    if (input.includes(word)) points++;
  });

  // bonus for length
  if (input.length > 40) points++;

  return points;
}

function aiReply(points) {
  if (points >= 3) return "...Impressive. You survive.";
  if (points === 2) return "Acceptable. Continue.";
  return "Pathetic. You failed.";
}

function startTimer() {
  time = 10;
  timerEl.innerText = "Time: " + time;

  clearInterval(timer);
  timer = setInterval(() => {
    time--;
    timerEl.innerText = "Time: " + time;

    if (time <= 0) {
      clearInterval(timer);
      typeAI("Time is up. You hesitated.");
      typeAI("💀 GAME OVER | Score: " + score);
    }
  }, 1000);
}

function nextRound() {
  startTimer();
  const scenario = randomScenario();
  typeAI(scenario);
}

function send() {
  const input = document.getElementById("input");
  const text = input.value.toLowerCase();
  if (!text) return;

  clearInterval(timer);

  addUser(input.value);
  input.value = "";

  const points = evaluateResponse(text);

  setTimeout(() => {
    const reply = aiReply(points);
    typeAI(reply, () => {
      if (points < 2) {
        typeAI("💀 GAME OVER | Score: " + score);
        return;
      }

      score++;
      scoreEl.innerText = "Score: " + score;

      setTimeout(nextRound, 1000);
    });
  }, 500);
}

function restart() {
  score = 0;
  log.innerHTML = "";
  scoreEl.innerText = "Score: 0";
  nextRound();
}

nextRound();
</script>

</body>
</html>
