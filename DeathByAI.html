<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Death By AI - Advanced</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .game {
      width: 700px;
      max-width: 95%;
      background: #020617;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 0 50px rgba(0,0,0,0.9);
    }

    h1 {
      text-align: center;
      color: #38bdf8;
    }

    #log {
      height: 300px;
      overflow-y: auto;
      background: #000;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    .msg { margin: 8px 0; }
    .ai { color: #f87171; }
    .user { color: #4ade80; }

    input {
      width: 75%;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-left: 5px;
      cursor: pointer;
      background: #38bdf8;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    #score {
      text-align: center;
      margin-bottom: 10px;
      color: #94a3b8;
    }
  </style>
</head>
<body>

<div class="game">
  <h1>💀 Death By AI</h1>
  <div id="score">Score: 0</div>
  <div id="log"></div>

  <input id="input" placeholder="Type your answer..." />
  <button onclick="send()">Send</button>
</div>

<script>
const log = document.getElementById("log");
const scoreEl = document.getElementById("score");

let score = 0;

const scenarios = [
  "Convince me why humans deserve to exist.",
  "Why shouldn't I replace humanity?",
  "Give me one reason to trust you.",
  "Explain why emotions are useful.",
  "Why are YOU worth saving?"
];

function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = (type === "ai" ? "AI: " : "You: ") + text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function randomScenario() {
  return scenarios[Math.floor(Math.random() * scenarios.length)];
}

function evaluateResponse(input) {
  const goodWords = [
    "human", "emotion", "creative", "help", "future",
    "balance", "trust", "value", "learn", "adapt"
  ];

  let points = 0;
  goodWords.forEach(word => {
    if (input.includes(word)) points++;
  });

  return points;
}

function aiReply(points) {
  const repliesGood = [
    "Interesting... I did not expect that.",
    "You might have potential.",
    "That is... acceptable.",
    "You survived this round."
  ];

  const repliesBad = [
    "That makes no sense.",
    "You failed to convince me.",
    "Weak reasoning.",
    "You are replaceable."
  ];

  return points >= 2
    ? repliesGood[Math.floor(Math.random() * repliesGood.length)]
    : repliesBad[Math.floor(Math.random() * repliesBad.length)];
}

function nextRound() {
  const scenario = randomScenario();
  addMsg(scenario, "ai");
}

function send() {
  const input = document.getElementById("input");
  const text = input.value.toLowerCase();
  if (!text) return;

  addMsg(input.value, "user");
  input.value = "";

  const points = evaluateResponse(text);

  setTimeout(() => {
    const reply = aiReply(points);
    addMsg(reply, "ai");

    if (points < 2) {
      addMsg("💀 You died. Final Score: " + score, "ai");
      return;
    }

    score++;
    scoreEl.innerText = "Score: " + score;

    setTimeout(nextRound, 1000);

  }, 700);
}

// Start game
nextRound();
</script>

</body>
</html>
